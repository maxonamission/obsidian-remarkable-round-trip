name: Bootstrap release

# One-time bootstrap path: the first beta was launched from a session whose
# integration token could push branches but not tags or workflow dispatches.
# Fires only when .release-trigger changes; the version comes from
# manifest.json. Regular releases run via release.yml (tag push from
# codebase-galdhopiggen's release-plugin.yml).
on:
  push:
    branches: [main]
    paths:
      - ".release-trigger"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build the plugin from this repo's source
        run: |
          npm ci
          npm run build
      - name: Determine version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Extract release notes for this version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          : > RELEASE_NOTES.md
          if [ -f CHANGELOG.md ]; then
            awk -v v="$VERSION" '
              $0 ~ ("^## \\[" v "\\]") { f=1; next }
              /^## \[/ && f { exit }
              f { print }
            ' CHANGELOG.md > RELEASE_NOTES.md
          fi
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            main.js
            manifest.json
